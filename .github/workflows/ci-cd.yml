name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: tienda_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 9
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'
    
    - name: Install dependencies
      working-directory: ./backend
      run: pnpm install
    
    - name: Generate Prisma Client
      working-directory: ./backend
      run: pnpm prisma generate
    
    - name: Run migrations
      working-directory: ./backend
      run: pnpm prisma migrate deploy
      env:
        DATABASE_URL: postgresql://admin:admin123@localhost:5432/tienda_db
    
    - name: Run tests
      working-directory: ./backend
      run: pnpm test
      env:
        DATABASE_URL: postgresql://admin:admin123@localhost:5432/tienda_db
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        JWT_EXPIRES_IN: 7d
        STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
        VERIFACTU_API_KEY: ${{ secrets.VERIFACTU_API_KEY }}
        RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        EMAIL_FROM: noreply@tienda.com
        ADMIN_EMAIL: admin@tienda.com
        REPORTS_FOLDER: ./reports
        CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
        CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
        CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        NODE_ENV: test

  test-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 9
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'
    
    - name: Install dependencies
      working-directory: ./frontend
      run: pnpm install
    
    - name: Build frontend
      working-directory: ./frontend
      run: pnpm build

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: tienda_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 9
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'
    
    - name: Install backend dependencies
      working-directory: ./backend
      run: pnpm install
    
    - name: Generate Prisma Client
      working-directory: ./backend
      run: pnpm prisma generate
    
    - name: Build backend
      working-directory: ./backend
      run: pnpm build
    
    - name: Run backend migrations
      working-directory: ./backend
      run: pnpm prisma migrate deploy
      env:
        DATABASE_URL: postgresql://admin:admin123@localhost:5432/tienda_db
    
    - name: Seed database
      working-directory: ./backend
      run: pnpm db:seed
      env:
        DATABASE_URL: postgresql://admin:admin123@localhost:5432/tienda_db
    
    - name: Start backend server
      working-directory: ./backend
      run: pnpm start &
      env:
        DATABASE_URL: postgresql://admin:admin123@localhost:5432/tienda_db
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        JWT_EXPIRES_IN: 7d
        STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
        VERIFACTU_API_KEY: ${{ secrets.VERIFACTU_API_KEY }}
        RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        EMAIL_FROM: noreply@tienda.com
        ADMIN_EMAIL: admin@tienda.com
        REPORTS_FOLDER: ./reports
        CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
        CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
        CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        NODE_ENV: test
        PORT: 3000
    
    - name: Wait for backend to be ready
      run: sleep 10 && curl --retry 5 --retry-delay 3 --retry-connrefused http://localhost:3000/api/products || true
    
    - name: Install frontend dependencies
      working-directory: ./frontend
      run: pnpm install
    
    - name: Install Playwright browsers
      working-directory: ./frontend
      run: npx playwright install --with-deps chromium
    
    - name: Run E2E tests
      working-directory: ./frontend
      run: npx playwright test
      env:
        CI: true

  deploy-preview:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/develop'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to Vercel Preview
      uses: vercel/action-deploy@v1
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: ./frontend

  deploy-production:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, e2e-tests]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy Frontend to Vercel Production
      uses: vercel/action-deploy@v1
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: ./frontend
        vercel-args: '--prod'
    
    - name: Deploy Backend to Render
      uses: johnbeynon/render-deploy-action@v0.0.8
      with:
        service-id: ${{ secrets.RENDER_SERVICE_ID }}
        api-key: ${{ secrets.RENDER_API_KEY }}